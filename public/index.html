<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatApp</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="app.css" />
    <script src="/socket.io/socket.io.js"></script>
    <link rel="icon" type="image/png" href="/logo.png" />
  </head>
  <body>




    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
      <div class="container-fluid">

        <!-- App Logo -->
        <a class="navbar-brand fw-bold" href="#">
          💬 ChatApp
        </a>

        <!-- Right side items -->
        <div class="d-flex align-items-center">

          <span class="text-white me-3">
            <span id="nav-username">Guest</span>
          </span>

          <span class="badge bg-success me-3">
            Online
          </span>

          <button class="btn btn-outline-light btn-sm" id="logout-btn">
            Logout
          </button>

        </div>

      </div>
    </nav>

















































    <main>
































      
      <section id="login-section">
        <h1>login</h1>
        <label> Enter your name to enter the chatroom </label>
        <input type="text" id="login-input" />

        <button id="login-btn">Login</button>
      </section>

      <section

        id="chat-section"
        class="w-500 mx-auto p-4 mt-2"
      >
        <h1 style="text-align: center">Chat App</h1>
        <div class="chat-header" style="color: aliceblue;">
          <h4>💬 Chat Room</h4>
        </div>

        <ol
          style="margin: 15px"
          id="chat-msg-list"
          class="list-group list-group-numbered"
        ></ol>

        <textarea
          class="form-control w-50 mx-auto"
          placeholder="Enter message"
          id="chat-input"
          style="height: 100px"
        ></textarea>

        <button
          id="btn"
          style="margin: 20px auto; display: block"
          type="button"
          class="btn btn-success"
        >
          Send
        </button>
      </section>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"
      integrity="sha384-fbbOQedDUMZZ5KreZpsbe1LCZPVmfTnH7ois6mU1QK+m14rQ1l2bGBq41eYeM/fS"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
